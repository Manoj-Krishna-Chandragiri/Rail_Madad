    <style>
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #4338ca;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }

      #root:empty {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #f3f4f6;
      }

      #root:empty::after {
        content: "";
        width: 50px;
        height: 50px;
        position: absolute;
        top: 50%;
        left: 50%;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #4338ca;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      :focus {
        outline: 2px solid #4338ca;
        outline-offset: 2px;
      }

      ::selection {
        background-color: #4338ca;
        color: white;
      }

      /* Prevent text selection on 3D canvas overlay */
      .select-none {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      .user-select-none {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
      }

      /* Prevent text selection on canvas section */
      canvas {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
    </style>

    <!-- Error suppression for browser extensions -->
    <script>
      // Suppress browser extension errors that don't affect our app
      window.addEventListener('error', function(e) {
        // Suppress common browser extension errors
        if (e.message && (
          e.message.includes('Cannot find menu item with id translate-page') ||
          e.message.includes('Cannot find menu item with id save-page') ||
          e.message.includes('message channel closed before a response was received') ||
          e.message.includes('Extension context invalidated') ||
          e.message.includes('chrome-extension://') ||
          e.message.includes('moz-extension://') ||
          e.message.includes('Grammarly') ||
          e.message.includes('The operation was aborted') ||
          e.message.includes('Refused to load the script') ||
          e.message.includes('violates the following Content Security Policy directive') ||
          (e.filename && (e.filename.includes('content-all.js') || e.filename.includes('chrome-extension://')))
        )) {
          e.preventDefault();
          return false;
        }
      });
      
      // Suppress unhandled promise rejections from extensions
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && (
          (e.reason.message && (
            e.reason.message.includes('Cannot find menu item') ||
            e.reason.message.includes('message channel closed') ||
            e.reason.message.includes('Extension context invalidated') ||
            e.reason.message.includes('chrome-extension://') ||
            e.reason.message.includes('moz-extension://') ||
            e.reason.message.includes('A listener indicated an asynchronous response by returning true, but the message channel closed')
          )) ||
          (typeof e.reason === 'string' && (
            e.reason.includes('Cannot find menu item') ||
            e.reason.includes('message channel closed') ||
            e.reason.includes('A listener indicated an asynchronous response by returning true')
          ))
        )) {
          e.preventDefault();
          return false;
        }
      });

      // Suppress CSP violations from browser extensions
      document.addEventListener('securitypolicyviolation', function(e) {
        if (e.blockedURI && (
          e.blockedURI.includes('chrome-extension://') ||
          e.blockedURI.includes('moz-extension://') ||
          e.blockedURI.includes('grammarly') ||
          e.blockedURI.includes('translate')
        )) {
          e.preventDefault();
          return false;
        }
      });
    </script>
